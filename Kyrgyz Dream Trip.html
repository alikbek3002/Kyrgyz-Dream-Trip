<style>
:root {
  /* Alpine (default) */
  --bg: #f1ece1;
  --paper: #ebe5d8;
  --ink: #1a1814;
  --ink-soft: #3a362e;
  --muted: #6f6a5d;
  --line: #1a181422;
  --accent: #254a5c;
  --accent-soft: #d9cfba;
  --warn: #a84518;
}
[data-palette="felt"] {
  --bg: #e8dfce;
  --paper: #ddd1b8;
  --ink: #241a12;
  --ink-soft: #3d2d1e;
  --muted: #7a6a52;
  --line: #241a1230;
  --accent: #8f3a12;
  --accent-soft: #cfb994;
  --warn: #8f3a12;
}
[data-palette="midnight"] {
  --bg: #14171c;
  --paper: #1c2026;
  --ink: #eee6d3;
  --ink-soft: #c8bda2;
  --muted: #8a8573;
  --line: #eee6d322;
  --accent: #d4a24a;

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {

  color: var(--ink);
  font-family: "Source Serif 4", Georgia, serif;

.wrap { max-width: 1320px; margin: 0 auto; padding: 0 40px; }
.rule { border: 0; border-top: 1px solid var(--line); margin: 0; }

.masthead {

  border-bottom: 1px solid var(--line);
}
.masthead-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;

}
.masthead-left, .masthead-right { display: flex; gap: 20px; align-items: center; }
.masthead-right { justify-content: flex-end; }
.masthead .brand {

}
.masthead .brand .amp { font-style: italic; color: var(--accent); }
.nav-link { color: var(--ink); text-decoration: none; font-size: 13px; border-bottom: 1px solid transparent; padding-bottom: 2px; }
.nav-link:hover { border-bottom-color: var(--ink); }
.lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 2px; overflow: hidden; font-size: 11px; font-family: "JetBrains Mono", monospace; letter-spacing: 0.08em; }
.lang-toggle button { background: transparent; border: 0; padding: 5px 9px; color: var(--muted); cursor: pointer; font: inherit; text-transform: uppercase; }
.lang-toggle button.active { background: var(--ink); color: var(--bg); }

.issue-line {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 0 0;
}
.issue-line .mono { color: var(--muted); }

/* ----- Hero ----- */
.hero { padding: 36px 0 56px; border-bottom: 1px solid var(--line); }
.hero-grid {

  grid-template-columns: 1.15fr 1fr;
  gap: 48px;
  align-items: end;
}
.hero h1.serif-display {
  font-size: clamp(56px, 7.4vw, 108px);
  line-height: 0.94;
  margin: 0 0 24px;
  letter-spacing: -0.02em;
}
.hero h1 .italic { font-style: italic; color: var(--accent); }
.hero h1 .break { display: block; }
.hero .lede {
  font-size: 19px;
  line-height: 1.55;
  max-width: 40ch;
  color: var(--ink-soft);
  margin: 0;
  column-count: 1;
}
.hero .lede .cyr { display: block; font-size: 15px; margin-top: 6px; }
.hero-meta {
  display: flex; gap: 28px; margin-top: 22px;
  color: var(--muted);
}
.hero-meta > div { display: flex; flex-direction: column; gap: 2px; }
.hero-meta .v { font-family: "DM Serif Display", serif; font-size: 22px; color: var(--ink); }

/* Hero photo placeholder */
.hero-photo {
  position: relative;
  aspect-ratio: 4/5;
  background: var(--paper);
  border: 1px solid var(--line);
  overflow: hidden;
}
.placeholder-stripes {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    135deg,
    var(--paper) 0 14px,
    var(--accent-soft) 14px 15px
  );
}
.placeholder-label {
  position: absolute; left: 12px; bottom: 12px;
  background: var(--bg); color: var(--ink);
  padding: 6px 8px;
  border: 1px solid var(--line);
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  max-width: calc(100% - 24px);
}
.placeholder-label .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); margin-right: 6px; vertical-align: middle; }

.hero-caption {
  margin-top: 10px; display: flex; justify-content: space-between; color: var(--muted);
  border-top: 1px solid var(--line); padding-top: 8px;
}

/* ----- Search bar ----- */
.search-bar {
  margin-top: 36px;
  border: 1px solid var(--ink);
  background: var(--paper);
  display: grid;
  grid-template-columns: 1.3fr 1fr 1fr auto;
  align-items: stretch;
}
.search-bar > div { padding: 14px 18px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 4px; }
.search-bar > div:last-child { border-right: 0; padding: 0; }
.search-bar label { color: var(--muted); }
.search-bar input, .search-bar select {
  background: transparent; border: 0; outline: 0; color: var(--ink);
  font-family: "Source Serif 4", serif; font-size: 17px; padding: 0;
}
.search-bar input::placeholder { color: var(--muted); font-style: italic; }
.search-btn {
  background: var(--ink); color: var(--bg);
  border: 0; cursor: pointer;
  font-family: "DM Serif Display", serif; font-size: 20px;
  padding: 0 40px;
  letter-spacing: 0.01em;
}
.search-btn:hover { background: var(--accent); }

/* ----- Section headers ----- */
.section-head {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: baseline; gap: 24px;
  padding: 48px 0 20px;
}
.section-head .num { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }
.section-head h2 { font-family: "DM Serif Display", serif; font-size: 44px; margin: 0; letter-spacing: -0.01em; }
.section-head h2 .italic { font-style: italic; color: var(--accent); }
.section-head .right { color: var(--muted); }
.section-head .line { grid-column: 1 / -1; border-top: 2px solid var(--ink); margin-top: 12px; }

/* ----- Tour cards (Stacked default) ----- */
.tours { padding-bottom: 60px; }
.tours-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
}
.card {
  position: relative;
  border-right: 1px solid var(--line);
  padding: 28px 24px 32px;
  display: flex; flex-direction: column;
  min-height: 520px;
}
.card:last-child { border-right: 0; }
.card-num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 14px; display: flex; justify-content: space-between; }
.card-photo {
  position: relative; aspect-ratio: 5/4; background: var(--paper);
  border: 1px solid var(--line); overflow: hidden;
  margin-bottom: 18px;
}
.card h3 {
  font-family: "DM Serif Display", serif; font-weight: 400;
  font-size: 30px; line-height: 1.05; margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.card h3 .italic { font-style: italic; color: var(--accent); }
.card .cyr-title { display: block; font-size: 15px; color: var(--muted); font-style: italic; margin-bottom: 12px; }
.card .deck { font-size: 16px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 18px; max-width: 36ch; }
.card .specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  margin-top: auto;
}
.card .specs div { display: flex; flex-direction: column; gap: 2px; }
.card .specs .k { color: var(--muted); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.card .specs .v { font-family: "DM Serif Display", serif; font-size: 17px; }

/* Hover reveal */
.card-reveal {
  position: absolute; inset: 0;
  background: var(--ink);
  color: var(--bg);
  padding: 32px 28px;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 260ms ease;
}
.card:hover .card-reveal { opacity: 1; pointer-events: auto; }
.card-reveal .mono { color: rgba(255,255,255,0.55); }
.card-reveal .pull {
  font-family: "DM Serif Display", serif; font-style: italic;
  font-size: 26px; line-height: 1.25; margin: 18px 0 14px;
  max-width: 28ch;
}
.card-reveal .pull .mark { color: var(--accent-soft); }
.card-reveal .attrib { color: rgba(255,255,255,0.65); font-size: 13px; margin-bottom: auto; }
.card-reveal .itin { display: grid; gap: 6px; margin: 16px 0; }
.card-reveal .itin .row { display: grid; grid-template-columns: 50px 1fr; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.85); border-top: 1px solid rgba(255,255,255,0.12); padding-top: 6px; }
.card-reveal .itin .row .d { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); padding-top: 3px; }
.card-reveal .book {
  display: inline-flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border: 1px solid rgba(255,255,255,0.3);
  color: var(--bg); text-decoration: none;
  font-family: "DM Serif Display", serif; font-size: 17px;
}
.card-reveal .book:hover { background: var(--bg); color: var(--ink); }
.card-reveal .book .arr { font-family: "JetBrains Mono", monospace; font-size: 12px; }

/* Layout variant: Magazine */
[data-layout="magazine"] .tours-grid { grid-template-columns: 1.3fr 1fr 1fr; }
[data-layout="magazine"] .card { min-height: 600px; }
[data-layout="magazine"] .card:first-child { padding: 36px 32px 36px; }
[data-layout="magazine"] .card:first-child .card-photo { aspect-ratio: 4/5; }
[data-layout="magazine"] .card:first-child h3 { font-size: 44px; }
[data-layout="magazine"] .card:first-child .deck { font-size: 18px; max-width: 40ch; }

/* Layout variant: Postcard */
[data-layout="postcard"] .tours-grid { gap: 20px; border-top: 0; padding-top: 8px; grid-template-columns: repeat(3, 1fr); }
[data-layout="postcard"] .card {
  border: 1px solid var(--line);
  background: var(--paper);
  border-right: 1px solid var(--line);
  padding: 18px;
  min-height: auto;
}
[data-layout="postcard"] .card .card-photo { aspect-ratio: 4/3; margin-bottom: 14px; }
[data-layout="postcard"] .card h3 { font-size: 24px; }
[data-layout="postcard"] .card .specs { grid-template-columns: repeat(4, 1fr); }

/* ----- Why us ----- */
.why { padding: 40px 0 60px; border-top: 1px solid var(--line); margin-top: 40px; }
.why-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 48px; align-items: start; }
.why h2 { font-family: "DM Serif Display", serif; font-size: 56px; line-height: 0.98; margin: 0; letter-spacing: -0.01em; }
.why h2 .italic { font-style: italic; color: var(--accent); }
.why .pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 36px 40px; }
.why .pillar h4 { font-family: "DM Serif Display", serif; font-weight: 400; font-size: 22px; margin: 0 0 4px; }
.why .pillar .cyr-sub { display: block; color: var(--muted); font-style: italic; font-size: 14px; margin-bottom: 10px; }
.why .pillar p { margin: 0; color: var(--ink-soft); font-size: 15px; }
.why .pillar .n { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 10px; display: block; }
.why-divider { border-top: 1px solid var(--line); margin: 24px 0; grid-column: 1 / -1; }

/* ----- Guides ----- */
.guides { padding: 40px 0 60px; border-top: 1px solid var(--line); }
.guides-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; }
.guide .portrait { aspect-ratio: 3/4; background: var(--paper); border: 1px solid var(--line); position: relative; overflow: hidden; }
.guide h4 { font-family: "DM Serif Display", serif; font-weight: 400; font-size: 22px; margin: 14px 0 2px; }
.guide .cyr-name { color: var(--muted); font-style: italic; font-size: 13px; }
.guide .role { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; display: block; }
.guide p { font-size: 14px; color: var(--ink-soft); margin: 8px 0 0; }

/* ----- Journal ----- */
.journal { padding: 40px 0 60px; border-top: 1px solid var(--line); }
.journal-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 32px; }
.article .photo { aspect-ratio: 3/2; background: var(--paper); border: 1px solid var(--line); position: relative; overflow: hidden; margin-bottom: 14px; }
.article .kicker { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
.article h3 { font-family: "DM Serif Display", serif; font-weight: 400; font-size: 26px; line-height: 1.15; margin: 8px 0 8px; }
.article .byline { color: var(--muted); font-size: 13px; font-style: italic; }
.article p { color: var(--ink-soft); font-size: 15px; margin: 8px 0 0; }
.journal .article:first-child .photo { aspect-ratio: 5/4; }
.journal .article:first-child h3 { font-size: 34px; }

/* ----- Footer ----- */
footer { border-top: 2px solid var(--ink); padding: 40px 0 30px; margin-top: 40px; }
.foot-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; align-items: start; }
.foot-grid h5 { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
.foot-grid a { display: block; color: var(--ink); text-decoration: none; padding: 4px 0; font-size: 15px; }
.foot-grid a:hover { color: var(--accent); }
.foot-brand .logo { font-family: "DM Serif Display", serif; font-size: 34px; letter-spacing: -0.01em; margin-bottom: 12px; }
.foot-brand p { color: var(--ink-soft); font-size: 15px; max-width: 38ch; margin: 0 0 16px; }
.foot-bottom { display: flex; justify-content: space-between; padding-top: 28px; border-top: 1px solid var(--line); margin-top: 32px; color: var(--muted); }

/* ----- Tweaks panel ----- */
.tweaks-panel {
  position: fixed; bottom: 16px; right: 16px; z-index: 50;
  background: var(--paper); border: 1px solid var(--ink);
  padding: 14px 16px;
  width: 260px;
  font-family: "Source Serif 4", serif;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  display: none;
}
.tweaks-panel.on { display: block; }
.tweaks-panel h5 { font-family: "DM Serif Display", serif; font-size: 18px; margin: 0 0 10px; font-weight: 400; }
.tweaks-panel .group { margin-bottom: 12px; }
.tweaks-panel .label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.tweak-options { display: flex; gap: 6px; }
.tweak-options button {
  flex: 1; padding: 6px 8px;
  background: transparent; color: var(--ink);
  border: 1px solid var(--line);
  font: inherit; font-size: 12px; cursor: pointer;
}
.tweak-options button.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* Swatch row */
.swatch-row { display: flex; gap: 6px; }
.swatch-row button { flex: 1; height: 32px; border: 1px solid var(--line); cursor: pointer; position: relative; padding: 0; }
.swatch-row button.active { outline: 2px solid var(--ink); outline-offset: 2px; }
.swatch-row button span { display: block; height: 100%; }
.sw-alpine { background: linear-gradient(to right, #f1ece1 0% 40%, #254a5c 40% 75%, #1a1814 75% 100%); }
.sw-felt { background: linear-gradient(to right, #e8dfce 0% 40%, #8f3a12 40% 75%, #241a12 75% 100%); }
.sw-midnight { background: linear-gradient(to right, #14171c 0% 40%, #d4a24a 40% 75%, #eee6d3 75% 100%); }

/* Filter pills */
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 14px; margin-bottom: 14px;
}
.pill {
  border: 1px solid var(--line);
  background: transparent;
  padding: 6px 12px;
  font: inherit; font-size: 13px;
  cursor: pointer;
  color: var(--ink);
  border-radius: 40px;
}
.pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.pill:hover:not(.active) { border-color: var(--ink); }
.empty-note { color: var(--muted); font-style: italic; padding: 40px 0; text-align: center; grid-column: 1 / -1; }

/* ----- Tweaks toggle button ----- */
.tweaks-toggle {
  position: fixed; bottom: 16px; right: 16px; z-index: 51;
  background: var(--ink); color: var(--bg);
  border: 0; cursor: pointer;
  font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 10px 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.tweaks-toggle:hover { background: var(--accent); }
.tweaks-panel.on ~ .tweaks-toggle,
.tweaks-panel.on + .tweaks-toggle { right: 292px; }
</style>
</head>

    if (typeof p === 'string') return <span key={i}>{p}</span>;
    if (p.italic) return <span key={i} className="italic">{p.italic}</span>;
    if (p.mark) return <span key={i} className="mark">{p.mark}</span>;
    return null;
  });
}

function Tours({ lang, query, filter, duration, season }) {
  const filtered = useMemo(() => TOURS.filter(t => {
    const q = query.trim().toLowerCase();
    if (q) {
      const hay = (t.title_ru + ' ' + JSON.stringify(t.title_en) + ' ' + t.deck + ' ' + t.tag + ' ' + t.region).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (filter !== 'all' && t.tag !== filter) return false;
    if (duration !== 'any') {
      const nights = parseInt(t.duration);
      if (duration === 'short' && nights > 5) return false;
      if (duration === 'medium' && (nights < 6 || nights > 8)) return false;
      if (duration === 'long' && nights < 9) return false;
    }
    if (season !== 'any') {
      if (season === 'summer' && !/Jun|Jul|Aug|Sep|May/.test(t.season)) return false;
      if (season === 'winter' && !/Dec|Jan|Feb/.test(t.season)) return false;
      if (season === 'shoulder' && !/Apr|Oct|Mar|Nov/.test(t.season)) return false;
    }
    return true;
  }), [query, filter, duration, season]);

  return (
    <section className="tours">
      <div className="wrap">
        <div className="section-head">
          <span className="num">§ 01</span>
          <h2>{lang==='en' ? <>The <span className="italic">journeys</span>, spring '26</> : <>Маршруты, <span className="italic">весна '26</span></>}</h2>
          <span className="mono right">{filtered.length} / {TOURS.length} {lang==='en'?'shown':'показано'}</span>
          <div className="line" />
        </div>
        <div className="tours-grid">
          {filtered.length === 0 ? (
            <div className="empty-note">
              {lang==='en'
                ? 'No journeys match that search. Try clearing a filter — we keep this catalog intentionally small.'
                : 'Ничего не найдено. Попробуйте сбросить фильтры — наш каталог намеренно небольшой.'}
            </div>
          ) : filtered.map((t, i) => <TourCard key={t.id} t={t} lang={lang} idx={i} />)}
        </div>
      </div>
    </section>
  );
}

  const [palette, setPalette] = useState(TWEAK_DEFAULTS.palette);
  const [layout, setLayout] = useState(TWEAK_DEFAULTS.layout);
  const [tweaksOn, setTweaksOn] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-palette', palette);
    document.documentElement.setAttribute('data-layout', layout);
  }, [palette, layout]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  return (
    <>
      <Masthead lang={lang} setLang={setLang} />
      <Hero
        lang={lang}
        query={query} setQuery={setQuery}
        filter={filter} setFilter={setFilter}
        duration={duration} setDuration={setDuration}
        season={season} setSeason={setSeason}
      />
      <Tours lang={lang} query={query} filter={filter} duration={duration} season={season} />
      <WhyUs lang={lang} />
      <Guides lang={lang} />
      <Journal lang={lang} />
      <Footer lang={lang} />
      <TweaksPanel
        palette={palette} setPalette={setPalette}
        layout={layout} setLayout={setLayout}
        on={tweaksOn}
      />
      <button
        className="tweaks-toggle"
        style={{ right: tweaksOn ? '292px' : '16px' }}
        onClick={() => setTweaksOn(v => !v)}
      >
        {tweaksOn ? '× Close' : '⊞ Tweaks'}
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
