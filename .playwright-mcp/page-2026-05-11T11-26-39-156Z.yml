                  - paragraph [ref=e156]: Отправляемся в путешествие по Кыргызстану — стране гор, озёр и древних традиций. Вас ждут живописные ущелья, прозрачные реки и песчаные каньоны. Увидите древнюю башню Бурана, посетите каньон Сказка и знаменитое ущелье Джеты-Огуз, где красные скалы напоминают застывших быков. Погрузитесь в атмосферу кочевой культуры, узнаете о традициях беркутовой охоты и примерите национальные костюмы в юрте. Пройдёте конной тропой к водопаду Девичьи слёзы, отдохнёте у берегов Иссык-Куля и совершите прогулку по его бирюзовой глади. Путешествие завершится в Бишкеке на шумном Ошском рынке.
