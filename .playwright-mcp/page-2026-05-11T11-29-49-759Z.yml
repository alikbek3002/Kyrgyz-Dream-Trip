  - generic [ref=e178]:
    - generic [ref=e180]:
      - text: § 02 — OUR APPROACH
      - heading "Four promises we refuse to break." [level=2] [ref=e181]
    - generic [ref=e182]:
      - generic [ref=e184]:
        - generic [ref=e185]: § I
        - heading "We pay guides by the day, not the head." [level=4] [ref=e186]
        - generic [ref=e187]: Гидам платим по дням, а не по людям.
        - paragraph [ref=e188]: Our lead guides earn a predictable salary across the season, so a rainy day doesn't cost them anything. Tips go straight to the host households.
      - generic [ref=e190]:
        - generic [ref=e191]: § II
        - heading "Groups are capped at eight. No exceptions." [level=4] [ref=e192]
        - generic [ref=e193]: Группа не более восьми. Без исключений.
        - paragraph [ref=e194]: A yurt sleeps eight with dignity. Past that, someone ends up on the floor or the family eats separately — both of which we refuse.
      - generic [ref=e196]:
        - generic [ref=e197]: § III
        - heading "Every itinerary has a rest day." [level=4] [ref=e198]
        - generic [ref=e199]: В каждом маршруте есть день отдыха.
        - paragraph [ref=e200]: Not a bonus hike. A real day where nothing is scheduled and the guesthouse has a kitchen you're welcome to use.
      - generic [ref=e202]:
        - generic [ref=e203]: § IV
        - heading "1.5% of each booking funds pasture repair." [level=4] [ref=e204]
        - generic [ref=e205]: 1,5% с каждого бронирования — на пастбища.
        - paragraph [ref=e206]: We contribute to the Jaichy Union's overgrazing recovery program in the Suusamyr and Arpa valleys. It's small. It's consistent.
