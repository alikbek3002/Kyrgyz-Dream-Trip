  - generic [ref=e169]:
    - generic [ref=e171]:
      - generic [ref=e172]: § 04
      - heading "From the journal" [level=2] [ref=e173]
      - generic [ref=e174]: Updated weekly
    - generic [ref=e176]:
      - article [ref=e178]:
        - img "Why we built the All Colors loop around Issyk-Kul" [ref=e180]
        - text: Field note · 5 min read
        - heading "Why we built the All Colors loop around Issyk-Kul" [level=3] [ref=e181]
        - text: By Galya · Spring 2026
        - paragraph [ref=e182]: Six days is the sweet spot between a flyover and a long expedition. We pace the lake so each day belongs to one thing — Burana, then canyon, then horses, then water.
      - article [ref=e184]:
        - 'img "The berkutchi: a working bond, not a show" [ref=e186]'
        - text: Tradition · 4 min read
        - 'heading "The berkutchi: a working bond, not a show" [level=3] [ref=e187]'
        - text: By the Bokonbaevo team
        - paragraph [ref=e188]: The eagle comes back to the glove because the hunter kept his word — fed her, walked her, never broke routine. The demo on Day 2 isn't staged. The bond is real.
      - article [ref=e190]:
        - img "What you actually make at the Day 5 felt masterclass" [ref=e192]
        - text: Craft · 3 min read
        - heading "What you actually make at the Day 5 felt masterclass" [level=3] [ref=e193]
        - text: By the kitchen, Kochkor
        - paragraph [ref=e194]: Merino wool, hot water, a bamboo mat and your hands. By the end of the session you walk out with a small shyrdak square — not a souvenir from a shop, a thing you made.
