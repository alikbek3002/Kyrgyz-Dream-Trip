        - generic [ref=e150]: Sprinter · road captain
        - paragraph [ref=e151]: Drives the Sprinter minibus the whole route — Bishkek to Karakol and back. Knows every viewpoint, every detour, every place to stop for fresh trout.
      - generic [ref=e153]:
        - img "Berkutchi host" [ref=e155]
        - heading "Berkutchi host" [level=4] [ref=e156]
        - generic [ref=e157]: Беркутчи
        - generic [ref=e158]: Eagle hunter · Issyk-Kul
        - paragraph [ref=e159]: Hereditary eagle hunter from the south shore. Runs the demo on Day 2 — the bird, the lure, the call back to the glove. Twenty-plus years on the saddle.
      - generic [ref=e161]:
        - img "Felt master" [ref=e163]
