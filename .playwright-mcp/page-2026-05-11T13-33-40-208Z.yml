        - generic [ref=e142]: Team coordinator · Bishkek
        - paragraph [ref=e143]: Loves Kyrgyzstan and Turkey, hosts the All Colors of Kyrgyzstan team. Tripster rating 4.9, 535 travelers, two years on the platform.
      - generic [ref=e145]:
        - img "Local driver" [ref=e147]
