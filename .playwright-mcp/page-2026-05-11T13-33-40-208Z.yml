  - generic [ref=e98]:
    - generic [ref=e100]:
      - text: § 02 — OUR APPROACH
      - heading "Four promises we refuse to break." [level=2] [ref=e101]
    - generic [ref=e102]:
      - generic [ref=e104]:
        - generic [ref=e105]: § I
        - heading "We pay guides by the day, not the head." [level=4] [ref=e106]
        - generic [ref=e107]: Гидам платим по дням, а не по людям.
        - paragraph [ref=e108]: Our lead guides earn a predictable salary across the season, so a rainy day doesn't cost them anything. Tips go straight to the host households.
      - generic [ref=e110]:
        - generic [ref=e111]: § II
        - heading "Groups are capped at fourteen." [level=4] [ref=e112]
        - generic [ref=e113]: Группа не больше четырнадцати.
        - paragraph [ref=e114]: A Sprinter seats fourteen comfortably and a yurt camp can host the same. Past that, the family ends up eating separately — which we refuse.
      - generic [ref=e116]:
        - generic [ref=e117]: § III
        - heading "Every itinerary has a rest moment." [level=4] [ref=e118]
        - generic [ref=e119]: В каждом маршруте есть передышка.
        - paragraph [ref=e120]: Not a bonus hike. A real pause — hot springs on Day 4, a slow yurt evening on Day 2, a free afternoon in Bishkek on Day 5.
      - generic [ref=e122]:
        - generic [ref=e123]: § IV
        - heading "1.5% of each booking funds pasture repair." [level=4] [ref=e124]
        - generic [ref=e125]: 1,5% с каждого бронирования — на пастбища.
        - paragraph [ref=e126]: We contribute to the Jaichy Union's overgrazing recovery program in the Suusamyr and Arpa valleys. It's small. It's consistent.
